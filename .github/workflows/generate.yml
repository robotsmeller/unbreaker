name: Generate UnbreakerData.lua

on:
  push:
    paths:
      - 'data/vanilla_globals.json'
      - 'data/library_stubs/*.json'
      - 'scripts/generate_lua.py'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Generate UnbreakerData.lua
        run: python scripts/generate_lua.py

      - name: Commit generated file
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: regenerate UnbreakerData.lua from JSON'
          file_pattern: 'mod/42/media/lua/shared/UnbreakerData.lua'
